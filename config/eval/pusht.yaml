defaults:
  - launcher: local
  - solver: guided_cem
  - _self_

world:
  env_name: swm/PushT-v1
  num_envs: ${eval.num_eval}
  max_episode_steps: ??? # make sure it's >= eval_budget

dataset:
  stats: ${eval.dataset_name}
  keys_to_cache:
    - action
    - proprio
    - state

seed: 42
policy: quentinll/lewm-pusht # ckpt name or random

plan_config:
  horizon: 5
  receding_horizon: 5
  action_block: 5 # frameskip

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 1
  goal_offset_steps: 50
  eval_budget: 50
  img_size: 224
  dataset_name: pusht_expert_train
  callables:
    # -- set state
    - method: _set_state
      args:
        state:
          value: state
    # -- set goal state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state
          
output:
  filename: pusht_results.txt